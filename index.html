<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T4C/Neerya - Créateur de Personnage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                repeating-linear-gradient(90deg,
                    transparent,
                    transparent 2px,
                    rgba(255, 255, 255, 0.02) 2px,
                    rgba(255, 255, 255, 0.02) 4px);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 90%;
            margin: 0 auto;
        }

        /* Links */
        a {
            color: #0099ff;
            text-decoration: none;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(0, 153, 255, 0.3);
        }

        a:hover {
            color: #00ccff;
            border-bottom-color: #00ccff;
        }

        a:visited {
            color: #6699ff;
            border-bottom-color: rgba(102, 153, 255, 0.3);
        }

        a:active {
            color: #0066cc;
        }

        /* Header */
        header {
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 2px solid #0066cc;
            padding: 20px 0;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 20px;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #0066cc;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo-mark {
            color: #fff;
            font-size: 28px;
            display: inline-block;
            margin-right: 8px;
        }

        /* Main content */
        main {
            animation: fadeIn 0.4s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats Section */
        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            color: #0066cc;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 102, 204, 0.3);
        }

        .stats-container {
            max-width: 1100px;
            margin: 0 auto 35px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 102, 204, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .stats-container h2 {
            margin: 0;
            padding: 20px 25px;
            border-bottom: 1px solid rgba(0, 102, 204, 0.3);
        }

        .stats-group {
            display: flex;
            gap: 12px;
            padding: 25px;
        }

        .stat-input {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1 1 0;
            min-width: 0;
        }

        .stat-input:first-child {
            flex: 2 1 0;
        }

        .stat-input input,
        .stat-input select {
            width: 100%;
        }

        .stat-input label {
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #b0b0b0;
            white-space: nowrap;
        }

        .stat-input input,
        .stat-input select {
            padding: 8px 10px;
            background: #2a2a2a;
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 4px;
            color: #ffffff;
            font-size: 13px;
            transition: all 0.2s;
        }

        .stat-input input:focus,
        .stat-input select:focus {
            outline: none;
            background: #333333;
            border-color: #0066cc;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }

        .stat-input input[readonly] {
            background: rgba(0, 102, 204, 0.15);
            color: #0099ff;
            cursor: default;
        }

        .quest-input {
            flex-direction: row;
            align-items: center;
            gap: 8px;
        }

        .quest-input label {
            white-space: normal;
            text-transform: none;
            font-size: 13px;
            color: #ffffff;
            font-weight: 400;
        }

        .quest-input input[type="checkbox"] {
            width: auto;
            flex: none;
        }

        .category-group {
            padding: 0 25px 25px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            max-width: 1100px;
            margin: 0 auto 35px;
        }

        .category-group label {
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #b0b0b0;
        }

        .category-group select {
            padding: 8px 10px;
            width: 250px;
            max-width: 100%;
            background: #2a2a2a;
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 4px;
            color: #ffffff;
            font-size: 13px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .category-group select:hover {
            border-color: #0066cc;
            background: #333333;
        }

        .category-group select:focus {
            outline: none;
            border-color: #0066cc;
            background: #333333;
            box-shadow: 0 0 0 2px rgba(0, 102, 204, 0.1);
        }

        /* Results */
        #results {
            margin-top: 35px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 102, 204, 0.2);
            border-radius: 6px;
        }

        table thead {
            background: #1a2e42;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        table thead th {
            background: #1a2e42;
        }

        table th {
            padding: 14px 12px;
            text-align: left;
            font-weight: 600;
            color: #0099ff;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(0, 102, 204, 0.3);
        }

        table tbody tr {
            border-bottom: 1px solid rgba(0, 102, 204, 0.1);
            transition: background 0.15s;
        }

        table tbody tr:nth-child(odd) {
            background: rgba(255, 255, 255, 0.01);
        }

        table tbody tr:hover {
            background: rgba(0, 102, 204, 0.1);
        }

        table td {
            padding: 12px;
            color: #d0d0d0;
        }

        table td strong {
            color: #ffcc66;
            font-weight: 700;
        }

        table td:first-child {
            padding-left: 16px;
        }

        table td:last-child {
            padding-right: 16px;
        }

        /* Status messages */
        .message {
            margin-top: 20px;
            padding: 16px 20px;
            background: rgba(0, 102, 204, 0.1);
            border: 1px solid rgba(0, 102, 204, 0.3);
            border-radius: 6px;
            color: #0099ff;
            text-align: center;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                width: 94%;
            }

            header {
                padding: 15px 0;
                margin-bottom: 20px;
            }

            .header-content {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }

            .header-content>div[style] {
                text-align: center !important;
            }

            .logo {
                font-size: 20px;
            }

            .stats-container h2 {
                padding: 16px 18px;
            }

            .stats-group {
                flex-wrap: wrap;
                padding: 18px;
                gap: 14px;
            }

            .stat-input,
            .stat-input:first-child {
                flex: 1 1 130px;
            }

            .category-group {
                padding: 0 18px 20px;
            }

            .category-group select {
                width: 100%;
            }

            #results {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 640px;
                font-size: 12px;
            }

            table th,
            table td {
                padding: 10px 8px;
            }
        }

        @media (max-width: 480px) {
            .logo-mark {
                font-size: 22px;
            }

            .stats-container h2 {
                padding: 14px 16px;
                font-size: 13px;
            }

            .stats-group {
                gap: 10px;
                padding: 14px;
            }

            .stat-input,
            .stat-input:first-child {
                flex: 1 1 calc(50% - 5px);
            }

            .stats-container .stats-group:nth-of-type(2) {
                flex-direction: column;
                align-items: stretch;
            }

            .stats-container .stats-group:nth-of-type(2) .stat-input {
                flex: 1 1 auto;
            }

            .category-group {
                padding: 0 14px 18px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-mark">⚔️</span>T4C Neerya
                </div>
                <div style="text-align: right;">
                    <span style="color: #666; font-size: 12px;">CRÉATEUR DE PERSONNAGE <span
                            style="color: #b8860b;">Beta 0.039</span></span>
                    <div style="font-size: 11px; margin-top: 4px;">
                        <a href="https://github.com/mvez73/T4C-builder-Neerya" target="_blank" rel="noopener noreferrer"
                            style="color: #0099ff; text-decoration: none;">Projet GitHub</a>
                        <span style="color: #444;"> · </span>
                        <a href="https://github.com/mvez73/T4C-builder-Neerya/blob/main/CHANGELOG.md" target="_blank"
                            rel="noopener noreferrer" style="color: #0099ff; text-decoration: none;">Changelog</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="stats-container">
            <h2 class="section-title">Personnage</h2>
            <div class="stats-group">
                <div class="stat-input">
                    <label for="classe">Renaissance</label>
                    <select id="classe">
                        <option value="humain">Humain</option>
                        <option value="renaissance1">Renaissance 1</option>
                        <option value="renaissance2">Renaissance 2</option>
                    </select>
                </div>
                <div class="stat-input">
                    <label for="force">Force</label>
                    <input type="number" id="force_req" min="0" value="0">
                </div>
                <div class="stat-input">
                    <label for="endurance">Endurance</label>
                    <input type="number" id="endurance_req" min="0" value="0">
                </div>
                <div class="stat-input">
                    <label for="dexterite">Dextérité</label>
                    <input type="number" id="dexterite_req" min="0" value="0">
                </div>
                <div class="stat-input">
                    <label for="sagesse">Sagesse</label>
                    <input type="number" id="sagesse_req" min="0" value="0">
                </div>
                <div class="stat-input">
                    <label for="intelligence">Intelligence</label>
                    <input type="number" id="intelligence_req" min="0" value="0">
                </div>
                <div class="stat-input">
                    <label for="niveau">Niveau</label>
                    <input type="text" id="niveau" readonly>
                </div>
                <div class="stat-input">
                    <label for="points_restants">Points restants</label>
                    <input type="text" id="points_restants" readonly>
                </div>
            </div>
            <div class="stats-group">
                <div class="stat-input quest-input">
                    <input type="checkbox" id="quete_anwynn">
                    <label for="quete_anwynn">Purification des ruines d'Anwynn (+5 points)</label>
                </div>
                <div class="stat-input">
                    <label for="quete_ebon_hold">Quêtes Ebon Hold complétées (+1 point chacune)</label>
                    <input type="number" id="quete_ebon_hold" min="0" max="5" value="0" placeholder="0">
                </div>
            </div>
        </div>

        <div class="category-group">
            <label for="category">Catégorie</label>
            <select id="category">
                <option value="">-- Sélectionner une catégorie --</option>
                <option value="sorts">Sorts</option>
                <option value="competences">Compétences</option>
                <option value="arcs">Arc et Flèches</option>
                <option value="melees">Armes de Mêlée</option>
                <option value="robes">Robes</option>
                <option value="capes" id="option-capes">Capes</option>
                <option value="armures">Armures</option>
                <option value="bijoux">Bijoux et Orbes</option>
            </select>
        </div>

        <div id="results"></div>
    </main>

    <script>
        const classeSelect = document.getElementById('classe');
        const niveauInput = document.getElementById('niveau');
        const pointsRestantsInput = document.getElementById('points_restants');

        const statsInputs = {
            force: document.getElementById('force_req'),
            endurance: document.getElementById('endurance_req'),
            dexterite: document.getElementById('dexterite_req'),
            sagesse: document.getElementById('sagesse_req'),
            intelligence: document.getElementById('intelligence_req')
        };

        const queteAnwynnInput = document.getElementById('quete_anwynn');
        const queteEbonHoldInput = document.getElementById('quete_ebon_hold');

        const categorySelect = document.getElementById('category');
        const capesOption = document.getElementById('option-capes');
        const resultsDiv = document.getElementById('results');

        // Configuration des classes
        const classes = {
            humain: { base: 20, nom: 'Humain' },
            renaissance1: { base: 25, nom: 'Renaissance 1' },
            renaissance2: { base: 30, nom: 'Renaissance 2' }
        };

        // Stats toujours présentes, quelle que soit la catégorie
        const statColumns = ['force_req', 'endurance_req', 'dexterite_req', 'sagesse_req', 'intelligence_req'];

        // Colonnes par catégorie (dans cet ordre)
        const categoryColumns = {
            sorts: ['element', 'nom', 'unique_neerya', 'niveau', ...statColumns, 'mana', 'prerequis', 'pc', 'prix', 'informations', 'obtention'],
            competences: ['nom', 'unique_neerya', 'niveau', ...statColumns, 'conditions', 'description', 'apprentissage', 'entraînement'],
            arcs: ['sous_type', 'nom', 'unique_neerya', ...statColumns, 'degats_min', 'degats_max', 'vitesse', 'prix', 'bonus', 'obtention'],
            melees: ['classe', 'nom', 'unique_neerya', 'niveau', ...statColumns, 'degats_min', 'degats_max', 'vitesse', 'prix', 'informations', 'obtention'],
            robes: ['nom', 'unique_neerya', 'niveau', ...statColumns, 'armure', 'prix', 'informations', 'obtention'],
            capes: ['nom', 'unique_neerya', 'niveau', ...statColumns, 'armure', 'prix', 'informations', 'obtention'],
            armures: ['_type', 'nom', 'unique_neerya', ...statColumns, 'ca', 'prix', 'informations', 'obtention'],
            bijoux: ['type', 'nom', 'unique_neerya', ...statColumns, 'ca', 'ile', 'informations', 'obtention']
        };

        // Libellés d'affichage des colonnes
        const columnLabels = {
            element: 'Élément',
            nom: 'Nom',
            unique_neerya: 'Unique Neerya',
            niveau: 'Niveau',
            force_req: 'For',
            endurance_req: 'End',
            dexterite_req: 'Dex',
            sagesse_req: 'Sag',
            intelligence_req: 'Int',
            mana: 'Mana',
            prerequis: 'Prérequis',
            pc: 'PC',
            prix: 'Prix',
            informations: 'Informations',
            obtention: 'Obtention',
            sous_type: 'Type',
            degats_min: 'Dégâts min',
            degats_max: 'Dégâts max',
            vitesse: 'Vitesse',
            bonus: 'Bonus',
            classe: 'Classe',
            armure: 'CA',
            _type: 'Emplacement',
            ca: 'CA',
            ile: 'Île',
            type: 'Type',
            conditions: 'Conditions',
            description: 'Description',
            apprentissage: 'Apprentissage',
            'entraînement': 'Entraînement'
        };

        // Charger les données
        const dataCache = {};

        async function loadData(category) {
            if (dataCache[category]) {
                return dataCache[category];
            }

            try {
                const response = await fetch(`${category}.json?t=${Date.now()}`, { cache: 'no-store' });
                if (!response.ok) throw new Error(`Impossible de charger ${category}.json`);
                const data = await response.json();
                dataCache[category] = Array.isArray(data) ? data : [data];
                return dataCache[category];
            } catch (error) {
                console.error(error);
                resultsDiv.innerHTML = `<div class="message">Erreur : ${error.message}</div>`;
                return null;
            }
        }

        function getStats() {
            return {
                force: parseInt(statsInputs.force.value) || 0,
                endurance: parseInt(statsInputs.endurance.value) || 0,
                dexterite: parseInt(statsInputs.dexterite.value) || 0,
                sagesse: parseInt(statsInputs.sagesse.value) || 0,
                intelligence: parseInt(statsInputs.intelligence.value) || 0
            };
        }

        function getQuestBonusPoints() {
            const anwynnBonus = queteAnwynnInput.checked ? 5 : 0;
            const ebonHoldCount = Math.min(5, Math.max(0, parseInt(queteEbonHoldInput.value) || 0));
            return anwynnBonus + ebonHoldCount;
        }

        function computeLevelInfo(stats, classe, bonusPoints = 0) {
            const classConfig = classes[classe];
            const statValues = Object.values(stats);
            const total = statValues.reduce((a, b) => a + b, 0) - bonusPoints;

            // 5 points de stat au-dessus de la base = 1 niveau (le 1er point excédentaire fait déjà monter de niveau)
            const excess = Math.max(0, total - classConfig.base * statValues.length);
            const level = 1 + Math.ceil(excess / 5);

            // Points manquants pour atteindre le prochain niveau
            const remainder = (5 - (excess % 5)) % 5;

            return { level, remainder };
        }

        function updateEbonHoldAvailability() {
            const classe = classeSelect.value;
            const stats = getStats();
            const anwynnBonus = queteAnwynnInput.checked ? 5 : 0;
            const baseLevel = computeLevelInfo(stats, classe, anwynnBonus).level;
            const eligible = baseLevel >= 75;

            queteEbonHoldInput.disabled = !eligible;
            if (!eligible) {
                queteEbonHoldInput.value = '';
                queteEbonHoldInput.placeholder = 'Niveau 75+ requis';
            } else if (queteEbonHoldInput.placeholder !== '0') {
                queteEbonHoldInput.placeholder = '0';
            }
        }

        function calculateLevel() {
            const classe = classeSelect.value;
            const stats = getStats();

            updateEbonHoldAvailability();

            const bonusPoints = getQuestBonusPoints();
            const { level, remainder } = computeLevelInfo(stats, classe, bonusPoints);
            niveauInput.value = level;
            pointsRestantsInput.value = remainder;
        }

        function fillStatsWithBase() {
            const classe = classeSelect.value;
            const baseValue = classes[classe].base;

            Object.values(statsInputs).forEach(input => {
                input.value = baseValue;
            });

            updateCapesAvailability();
            calculateLevel();
            updateResults();
        }

        function updateCapesAvailability() {
            const classe = classeSelect.value;
            const hasAiles = classe === 'renaissance1' || classe === 'renaissance2';

            capesOption.disabled = hasAiles;

            if (hasAiles && categorySelect.value === 'capes') {
                categorySelect.value = '';
            }
        }

        function doesMeetRequirements(item, stats, playerLevel) {
            // Vérifier le niveau
            if (item.niveau !== undefined && item.niveau !== null && item.niveau > 0) {
                if (playerLevel < item.niveau) {
                    return false;
                }
            }

            // Vérifier chaque stat (force, endurance, dexterite, sagesse, intelligence)
            const statNames = ['force', 'endurance', 'dexterite', 'sagesse', 'intelligence'];

            for (const statName of statNames) {
                const required = item[`${statName}_req`];
                // Si le champ existe et a une valeur > 0, vérifier les stats de l'utilisateur
                if (required !== undefined && required !== null && required > 0) {
                    if (stats[statName] < required) {
                        return false;
                    }
                }
            }
            return true;
        }

        function normalizeItem(item, columns) {
            // Créer un objet avec toutes les colonnes de la catégorie
            const normalized = {};

            columns.forEach(col => {
                if (statColumns.includes(col) || col === 'niveau') {
                    // Stats et niveau : toujours présents, 0 par défaut si absent
                    normalized[col] = item[col] !== undefined && item[col] !== null ? item[col] : 0;
                } else {
                    normalized[col] = item[col] !== undefined ? item[col] : '';
                }
            });

            return normalized;
        }

        async function updateResults() {
            const category = categorySelect.value;

            if (!category) {
                resultsDiv.innerHTML = '';
                return;
            }

            const data = await loadData(category);
            if (!data) return;

            if (data.length === 0) {
                resultsDiv.innerHTML = '<div class="message">Aucune donnée pour cette catégorie.</div>';
                return;
            }

            const stats = getStats();
            const playerLevel = computeLevelInfo(stats, classeSelect.value, getQuestBonusPoints()).level;

            const filtered = data.filter(item => doesMeetRequirements(item, stats, playerLevel));

            if (filtered.length === 0) {
                resultsDiv.innerHTML = '<div class="message">Aucun item trouvé avec ces statistiques et ce niveau.</div>';
                return;
            }

            // Créer le tableau avec les colonnes de la catégorie
            const columns = categoryColumns[category] || statColumns;

            let html = '<table><thead><tr>';
            columns.forEach(col => {
                html += `<th>${columnLabels[col] || col}</th>`;
            });
            html += '</tr></thead><tbody>';

            filtered.forEach(item => {
                const normalized = normalizeItem(item, columns);
                html += '<tr>';
                columns.forEach(col => {
                    const value = normalized[col];
                    let displayValue = value;

                    // Formater les valeurs spéciales
                    if (col === 'unique_neerya') {
                        displayValue = value === true ? 'Oui' : 'Non';
                    } else if (Array.isArray(value)) {
                        displayValue = value.join(', ');
                    } else if (value === '' || value === null) {
                        displayValue = '-';
                    }

                    html += `<td>${displayValue}</td>`;
                });
                html += '</tr>';
            });

            html += '</tbody></table>';
            resultsDiv.innerHTML = html;

            // Ajouter target="_blank" à tous les liens
            const links = resultsDiv.querySelectorAll('a');
            links.forEach(link => {
                link.setAttribute('target', '_blank');
                link.setAttribute('rel', 'noopener noreferrer');
            });
        }

        // Event listeners
        Object.values(statsInputs).forEach(input => {
            input.addEventListener('change', () => {
                calculateLevel();
                updateResults();
            });
            input.addEventListener('input', () => {
                calculateLevel();
                updateResults();
            });
        });

        [queteAnwynnInput, queteEbonHoldInput].forEach(input => {
            input.addEventListener('change', () => {
                calculateLevel();
                updateResults();
            });
            input.addEventListener('input', () => {
                calculateLevel();
                updateResults();
            });
        });

        classeSelect.addEventListener('change', () => {
            fillStatsWithBase();
        });

        categorySelect.addEventListener('change', updateResults);

        // Initialiser avec les valeurs de base d'Humain
        fillStatsWithBase();
    </script>
</body>

</html>
